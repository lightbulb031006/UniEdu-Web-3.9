<div class="reports-page">
    <div class="flex justify-between items-center mb-4">
        <h2>Reports</h2>
        <div class="flex gap-2">
            <select id="reportPeriod" class="form-control">
                <option value="all">All Time</option>
                <option value="year">This Year</option>
                <option value="month">This Month</option>
            </select>
            <button class="btn" onclick="window.ReportPage.exportReport()">
                <i class="fas fa-download"></i> Export CSV
            </button>
        </div>
    </div>

    <!-- Overview Cards -->
    <div class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));">
        <div class="card">
            <h3>Classes Overview</h3>
            <div class="text-xl font-bold" id="classesTotal">0</div>
            <div class="text-muted text-sm" id="classesActive">0 active classes</div>
            <div class="chart-container mt-4" id="classesChart">
                <!-- Pie chart will be inserted here -->
            </div>
        </div>

        <div class="card">
            <h3>Students Overview</h3>
            <div class="text-xl font-bold" id="studentsTotal">0</div>
            <div class="text-muted text-sm" id="studentsActive">0 active students</div>
            <div class="chart-container mt-4" id="studentsChart">
                <!-- Pie chart will be inserted here -->
            </div>
        </div>

        <div class="card">
            <h3>Revenue Overview</h3>
            <div class="text-xl font-bold" id="revenueTotal">$0</div>
            <div class="text-muted text-sm" id="revenuePending">0 pending payments</div>
            <div class="chart-container mt-4" id="revenueChart">
                <!-- Pie chart will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Revenue by Class -->
    <div class="card mt-4">
        <h3>Revenue by Class</h3>
        <div class="chart-container" id="revenueByClassChart">
            <!-- Bar chart will be inserted here -->
        </div>
        <div class="table-container mt-4">
            <table class="table-striped">
                <thead>
                    <tr>
                        <th>Class</th>
                        <th>Students</th>
                        <th>Revenue</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="revenueByClassTable">
                    <!-- Class revenue data will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Teacher Performance -->
    <div class="card mt-4">
        <h3>Teacher Performance</h3>
        <div class="table-container">
            <table class="table-striped">
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Classes</th>
                        <th>Students</th>
                        <th>Revenue</th>
                    </tr>
                </thead>
                <tbody id="teacherPerformanceTable">
                    <!-- Teacher performance data will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
