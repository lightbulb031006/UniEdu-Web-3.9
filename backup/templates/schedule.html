<div class="schedule-page">
    <div class="flex justify-between items-center mb-4">
        <h2>Schedule</h2>
        <div class="flex gap-2">
            <button class="btn btn-muted" id="prevWeekBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span id="currentWeek" class="text-lg font-bold py-2"></span>
            <button class="btn btn-muted" id="nextWeekBtn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div class="card">
        <div class="grid schedule-grid">
            <!-- Time slots column -->
            <div class="schedule-times">
                <div class="schedule-header">Time</div>
                <!-- Time slots will be inserted here -->
            </div>

            <!-- Day columns -->
            <div class="schedule-day">
                <div class="schedule-header">Monday</div>
                <div class="schedule-slots" data-day="monday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Tuesday</div>
                <div class="schedule-slots" data-day="tuesday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Wednesday</div>
                <div class="schedule-slots" data-day="wednesday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Thursday</div>
                <div class="schedule-slots" data-day="thursday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Friday</div>
                <div class="schedule-slots" data-day="friday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Saturday</div>
                <div class="schedule-slots" data-day="saturday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
            
            <div class="schedule-day">
                <div class="schedule-header">Sunday</div>
                <div class="schedule-slots" data-day="sunday">
                    <!-- Class slots will be inserted here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Class Slot Template -->
<template id="classSlotTemplate">
    <div class="class-slot" data-class-id="">
        <div class="class-name"></div>
        <div class="class-details">
            <div class="teacher-name"></div>
            <div class="student-count"></div>
        </div>
    </div>
</template>

<!-- View Class Schedule Details Modal Template -->
<template id="scheduleDetailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="scheduleDetailsTitle"></h3>
            <button class="btn-close" onclick="window.Modal.close()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="card">
                <h4>Class Information</h4>
                <div class="details-grid mt-2">
                    <div class="label">Teacher:</div>
                    <div id="scheduleDetailsTeacher"></div>
                    <div class="label">Schedule:</div>
                    <div id="scheduleDetailsTime"></div>
                    <div class="label">Duration:</div>
                    <div id="scheduleDetailsDuration"></div>
                    <div class="label">Students:</div>
                    <div id="scheduleDetailsStudents"></div>
                    <div class="label">Status:</div>
                    <div id="scheduleDetailsStatus"></div>
                </div>
            </div>

            <div class="card mt-4">
                <h4>Student List</h4>
                <div class="table-container mt-2">
                    <table class="table-striped">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleStudentsTable">
                            <!-- Students will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-muted" onclick="window.Modal.close()">Close</button>
            <button class="btn" onclick="window.SchedulePage.editClass()">Edit Class</button>
        </div>
    </div>
</template>
