<div class="teachers-page"></div>
    <div class="flex justify-between items-center mb-4">
        <h2>Danh sách giáo viên</h2>
        <button class="btn" id="newTeacherBtn">
            <i class="fas fa-plus"></i> New Teacher
        </button>
    </div>

    <div class="card">
        <div class="flex justify-between items-center mb-4">
            <div class="search-box">
                <input type="text" id="teacherSearch" placeholder="Search teachers..." class="form-control">
            </div>
            <div class="flex gap-2">
                <!-- reserved for filters -->
            </div>
        </div>

        <div class="table-container">
            <table id="teachersTable" class="table-striped" role="table">
                <thead>
                    <tr>
                            <th>Name</th>
                            <th>Gmail</th>
                            <th>Phone</th>
                            <th>Classes</th>
                            <th>Total Paid</th>
                        </tr>
                </thead>
                <tbody id="teachersTableBody">
                    <!-- Teachers rows go here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Teacher Modal Template -->
<template id="teacherFormTemplate">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="teacherModalTitle">
        <div class="modal-header">
            <h3 id="teacherModalTitle">New Teacher</h3>
            <button class="btn-close" data-dismiss="modal" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="teacherForm" novalidate>
                <div class="form-group">
                    <label for="tFullName">Full name*</label>
                    <input id="tFullName" name="fullName" type="text" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tGmail">Gmail*</label>
                        <input id="tGmail" name="gmail" type="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="tPhone">Phone*</label>
                        <input id="tPhone" name="phone" type="tel" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tBank">Bank account</label>
                    <input id="tBank" name="bankAccount" type="text" class="form-control">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-muted" data-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" id="saveTeacherBtn">Save</button>
        </div>
    </div>
</template>
