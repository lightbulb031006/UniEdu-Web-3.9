        #appBootSkeleton {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, rgba(31,41,55,0.15), rgba(17,24,39,0.7));
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #appBootSkeleton[data-state="hidden"] {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .app-boot-content {
            text-align: center;
            max-width: 360px;
            padding: 32px;
            border-radius: 24px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.35);

        .app-boot-spinner {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            margin: 0 auto 16px;
            animation: app-boot-spin 0.9s linear infinite;
        }
        .app-boot-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .app-boot-message {
            font-size: 0.95rem;
            opacity: 0.9;
        }
        @keyframes app-boot-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        (function configureAppMode() {
            const hostname = window.location.hostname;
            const defaultMode = ['localhost', '127.0.0.1'].includes(hostname) ? 'dev' : 'prod';
            const params = new URLSearchParams(window.location.search);
            const rawParam = params.get('appMode') || params.get('mode');

            const sanitizeModeInput = (value) => String(value || '')
                .trim()
                .toLowerCase()
                .replace(/[^a-z]/g, '');

            const resolveMode = (value) => {
                const sanitized = sanitizeModeInput(value);
                if (sanitized === 'dev') return 'dev';
                if (sanitized === 'prod') return 'prod';
                return null;
            };

            let storedOverride = null;
            try {
                storedOverride = localStorage.getItem('unicorns.forceAppMode');
            } catch (error) {
                storedOverride = null;
            }

            const normalizedParam = resolveMode(rawParam);
            const wantsClearOverride = rawParam && sanitizeModeInput(rawParam).includes('clearmode');

            if (normalizedParam) {
                try {
                    localStorage.setItem('unicorns.forceAppMode', normalizedParam);
                    storedOverride = normalizedParam;
                } catch (error) {
                    console.warn('[AppMode] Unable to persist override:', error);
                }
            } else if (wantsClearOverride) {
                try {
                    localStorage.removeItem('unicorns.forceAppMode');
                    storedOverride = null;
                    console.info('[AppMode] Cleared forced mode override.');
                } catch (error) {
                    console.warn('[AppMode] Unable to clear override:', error);
                }
            }

            const mode = window.APP_MODE
                || normalizedParam
                || resolveMode(storedOverride)
                || defaultMode;
            window.APP_MODE = mode;

            if (mode === 'dev') {
                window.ALLOW_SENSITIVE_LOCAL_CACHE = true;
                console.warn('[AppMode] DEV mode active (override). Use ?appMode=prod to simulate production.');
            } else {
                window.ALLOW_SENSITIVE_LOCAL_CACHE = false;
                console.info('[AppMode] PROD mode active.');
            }
        })();
    </script>
    <script>
        (function setupBootOverlay() {
            const overlay = document.getElementById('appBootSkeleton');
            const messageEl = document.getElementById('appBootMessage');
            if (!overlay) return;

            const hideOverlay = (delay = 0) => {
                setTimeout(() => {
                    overlay.dataset.state = 'hidden';
                    setTimeout(() => overlay.remove(), 500);
                }, delay);
            };

            const updateMessage = (text) => {
                if (messageEl) messageEl.textContent = text;
            };

            window.addEventListener('UniData:ready', (event) => {
                const source = event.detail?.source || 'cache';
                if (source === 'cache') {
                    updateMessage('Đang hiển thị dữ liệu đã lưu. Đang kiểm tra Supabase…');
                } else if (source.startsWith('supabase')) {
                    updateMessage('Đã đồng bộ dữ liệu mới nhất.');
                    hideOverlay(200);
                } else if (source === 'seed') {
                    updateMessage('Đang sử dụng dữ liệu mẫu.');
                    hideOverlay(600);
                }
            });

            window.addEventListener('UniData:error', (event) => {
                const detail = event.detail?.error ? ` (${event.detail.error})` : '';
                updateMessage('Không thể đồng bộ Supabase' + detail + '. Đang hiển thị dữ liệu cục bộ.');
                hideOverlay(400);
            });

            window.addEventListener('UniData:dataset-applied', (event) => {
                const source = event.detail?.source;
                if (source === 'local-cache') {
                    updateMessage('Đã tải dữ liệu cục bộ, đang đồng bộ Supabase…');
                }
            });

            // Safety timeout
            setTimeout(() => hideOverlay(0), 8000);
        })();
    </script>
    <!-- bcryptjs for password hashing and verification -->
    <!-- bcryptjs (no SRI because CDN hash varies; ensure HTTPS instead) -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js" defer></script>
    <script>
        (function ensureBcryptLoaded() {
            function getBcryptFromWindow() {
                if (typeof window === 'undefined') return null;
                if (window.bcryptjs) return window.bcryptjs;
                if (window.bcrypt) return window.bcrypt;
                if (window.dcodeIO && window.dcodeIO.bcrypt) return window.dcodeIO.bcrypt;
                return null;
            }

            function setGlobal(lib) {
                if (typeof window !== 'undefined' && lib) {
                    window.bcryptjs = lib;
                }
            }

            const initialLib = getBcryptFromWindow();
            if (initialLib) {
                setGlobal(initialLib);
                console.log('✅ bcryptjs loaded successfully');
                return;
            }

            if (typeof bcryptjs !== 'undefined') {
                setGlobal(bcryptjs);
                console.log('✅ bcryptjs loaded successfully');
                return;
            }

            console.warn('⚠️ bcryptjs not loaded from jsDelivr, trying fallback CDN...');
            const fallback = document.createElement('script');
            fallback.src = 'https://unpkg.com/bcryptjs@2.4.3/dist/bcrypt.min.js';
            fallback.async = true;
            fallback.onload = () => {
                const lib = getBcryptFromWindow();
                if (lib) {
                    setGlobal(lib);
                    console.log('✅ bcryptjs fallback loaded');
                } else {
                    console.error('❌ bcryptjs fallback loaded but library unavailable');
                }
            };
            fallback.onerror = () => console.error('❌ Unable to load bcryptjs from fallback CDN');
            document.head.appendChild(fallback);
        })();
    </script>
